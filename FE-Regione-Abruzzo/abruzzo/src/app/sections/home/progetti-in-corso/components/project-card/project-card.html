<div class="project-card">
      <h2 class="card-title">{{ progetto.titolo }}</h2>
      <p class="card-description">{{ progetto.descrizione }}</p>

      <hr class="line-separator" />

      <div class="card-details">
        <div class="rows">
          Servizi: <p>{{ progetto.servizi }}</p>
        </div>

        <div class="rows">
          Stato: <p>{{ progetto.stato }}</p>
        </div>
      </div>
    </div>
