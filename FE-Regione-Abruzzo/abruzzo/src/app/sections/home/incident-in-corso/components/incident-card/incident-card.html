<div class="incident-card">
  
  <div class="d-flex align-items-center mb-2">
    <svg class="icon icon-warning icon-sm me-2">
      <use href="assets/bootstrap-italia/sprites.svg#it-warning-circle"></use>
    </svg>
    <h6 class="card-title mb-0">{{ titolo }}</h6>
  </div>

  <p class="card-description">{{ descrizione }}</p>
  
  <hr class="line-separator"/>
  
  <div class="card-details">
    <div class="card-column">Servizio:<p>{{ servizio }}</p></div>
    <div class="card-column">ID Servizio: <p>{{ id_servizio }}</p></div>
    <div class="card-column">Data invio: <p>{{ data_invio }}</p></div>
  </div>

</div>
