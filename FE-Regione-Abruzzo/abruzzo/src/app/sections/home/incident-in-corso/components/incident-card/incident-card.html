<div class="incident-card">
    <h6 class="card-title">{{ titolo }}</h6>
    <p class="card-description">{{ descrizione }}</p>
    <hr class="line-separator"/> 
    <div class="card-details">
        <div class="card-column">Servizio:<p>{{ servizio }}</p></div>
        <div class="card-column">Data: <p>{{ data }}</p></div>
        <div class="card-column">Stato: <p>{{ stato }}</p></div>
    </div>
</div>
