<app-section-header
  titolo="Catalogo"
  link="/catalogo"
  testoLink="Vedi catalogo completo">
</app-section-header>

<section #splideRef class="splide">
  <div class="splide__track">
    <ul class="splide__list">

      @for(servizio of servizi; track servizio.id) {
        <li class="splide__slide">
          <app-servizio-card
            [servizio]="servizio">
          </app-servizio-card>

        </li>
      }

    </ul>
  </div>
</section>
