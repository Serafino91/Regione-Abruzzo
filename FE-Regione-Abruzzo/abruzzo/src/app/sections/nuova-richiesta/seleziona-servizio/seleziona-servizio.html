<div class="container-custom mt-1">
  <div class="w-100 pb-5 pt-1">
    <p>
      Seleziona il tipo di servizio da richiedere e compila tutti i campi della richiesta
    </p>
  </div>
  <h5 class="w-100 pb-4">Seleziona il servizio da richiedere</h5>

  <form [formGroup]="formGroup" class="mb-4 col-md-12">

    <div class="d-flex align-items-center gap-4">

      <div class="col-md-4">
        <div class="select-wrapper">
          <label for="categoria">Categoria</label>
          <select id="categoria" formControlName="categoria">
            <option value="">Seleziona...</option>
            @for (categoria of categorie; track categoria.id) {
              <option [value]="categoria.id">
                {{ categoria.name + " - " + categoria.description }}
              </option>
            }
          </select>
        </div>
      </div>

      <div class="col-md-4">
        <div class="select-wrapper">
          <label for="servizio">Servizio</label>
          <select
            id="servizio"
            formControlName="servizio"
            [disabled]="servizi.length === 0">
            <option value="">Seleziona un servizio</option>
            @for (servizio of servizi; track servizio.id) {
              <option [value]="servizio.id">
                {{ servizio.item }}
              </option>
            }
          </select>
        </div>
      </div>

      <div class="col-md-2 ">
        <div class="select-wrapper">
        <div class="input-number">
          <label for="unit">Unità</label>
          <input
            id="unit"
            type="number"
            formControlName="unit">
        </div>
        </div>
      </div>

      <div class="col-md-2">
        <button
          type="submit"
          class="btn btn-primary"
          (click)="aggiungiServizi()">
          Aggiungi
        </button>
      </div>

    </div>


  </form>

</div>
