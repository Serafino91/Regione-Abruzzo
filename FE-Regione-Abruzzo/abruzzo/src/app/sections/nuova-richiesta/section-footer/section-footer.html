<div class="line-separator"></div>
<div class="section-footer">

  @if (currentStep != 1) {
    <button
      class="btn btn-outline-primary"
      (click)="previous.emit()">
      Indietro
    </button>
  } @else {
    <div></div>
  }

  @if (currentStep != 3) {
  <button
      class="btn btn-outline-primary"
      (click)="next.emit()">
      Avanti
    </button>
  } @else {
    <button
      class="btn btn-outline-primary">
      Invia
    </button>
  }

</div>
