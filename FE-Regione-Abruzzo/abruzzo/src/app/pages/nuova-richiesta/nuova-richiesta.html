<div class="nuova-richiesta-container">
<h3 class="it-header-block-title"> Nuova Richiesta</h3>

<app-nav-form [currentStep]="currentStep"></app-nav-form>
</div>
@if(currentStep === 1) {
  <app-scegli-progetto
    [formGroup]="richiestaForm.controls['progetto']">
  </app-scegli-progetto>
}

@if(currentStep === 2) {
  <app-seleziona-servizio
    [formGroup]="richiestaForm.controls['servizio']">
  ></app-seleziona-servizio>
}

@if(currentStep === 3) {
  <app-controlla-invia
    [formGroup]="richiestaForm">
  ></app-controlla-invia>
}


<app-section-footer
  [currentStep]="currentStep"
  (next)="nextStep()"
  (previous)="previousStep()">
</app-section-footer>
