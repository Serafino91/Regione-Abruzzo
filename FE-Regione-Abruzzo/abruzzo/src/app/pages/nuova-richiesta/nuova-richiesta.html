<div class="nuova-richiesta-container">
<h3 class="it-header-block-title"> Nuova Richiesta</h3>

<app-nav-form [currentStep]="currentStep"></app-nav-form>
</div>
@if(currentStep === 1) {
  <app-scegli-progetto
    [formGroup]="richiestaForm.controls['progettoForm']">
  </app-scegli-progetto>
}

@if(currentStep === 2) {
  <app-seleziona-servizio
    [formGroup]="richiestaForm.controls['servizioForm']">
  </app-seleziona-servizio>
}

@if(currentStep === 3) {
  <app-controlla-invia
    [formGroupProgetto]="richiestaForm.controls['progettoForm']"
    [formGroupServizi]="richiestaForm.controls['servizioForm']">
  </app-controlla-invia>
}

<app-section-footer
  [currentStep]="currentStep"
  (next)="nextStep()"
  (previous)="previousStep()">
</app-section-footer>
