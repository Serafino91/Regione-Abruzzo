spring.application.name=regione-abruzzo

springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:mariadb://localhost:3306/regione_abruzzo
spring.datasource.username=root
spring.datasource.password=mariadb
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#TODO da chiedere se saliamo con degli script
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Threds per i tickets
spring.threads.virtual.enabled=true

# App Credentials for the Gateway
ra-ticket.gateway-url=https://raauth2-dev.regione.abruzzo.it/...
ra-ticket.service-url=https://raticket-be-dev.regione.abruzzo.it
ra-ticket.app-code=000022